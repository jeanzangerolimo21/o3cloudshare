name: Build O3 Client (Official Method)

on:
  push:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            qtbase5-dev \
            extra-cmake-modules \
            libssl-dev \
            libsqlite3-dev \
            libqt5svg5-dev \
            libqt5keychain-dev

      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          make -j4

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: o3-linux
          path: build/
